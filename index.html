<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hurghada 2026 – Aktivitetsplanering</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ground:  #0d2137;
      --text:    #1a3040;
      --text-dim:#7a9aaa;
      --accent:  #d98d15;
      --danger:  #bf3d1e;
      --tbl-hdr: #12304a;
      --row-b:   #f3eddb;
      --border:  rgba(0,0,0,0.09);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: var(--ground);
      padding: 24px 20px 48px;
      min-height: 100vh;
    }

    /* ── TOOLBAR ──────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .eyebrow {
      font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--accent); margin-bottom: 5px;
    }
    .toolbar-left h1 {
      font-size: 22px; font-weight: 800; color: #f0e8d0;
      letter-spacing: -0.3px; margin-bottom: 5px;
    }
    .toolbar-left p { font-size: 11.5px; color: rgba(240,232,208,0.42); }
    .toolbar-right  { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    /* ── BUTTONS ──────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      border: none; border-radius: 5px; padding: 8px 15px;
      font-size: 12.5px; font-weight: 600; cursor: pointer;
      transition: filter 0.14s, transform 0.1s; white-space: nowrap; line-height: 1;
    }
    .btn:hover  { filter: brightness(0.88); }
    .btn:active { transform: scale(0.97); }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-secondary {
      background: rgba(255,255,255,0.1); color: #e8dfc8;
      border: 1px solid rgba(255,255,255,0.17);
    }
    .btn-secondary:hover { filter: brightness(1.25); }
    .btn-copy {
      background: rgba(217,141,21,0.18); color: #d98d15;
      border: 1px solid rgba(217,141,21,0.35);
    }
    .btn-copy:hover { filter: brightness(1.2); }
    .btn-sm { padding: 7px 13px; font-size: 12px; }

    /* ── CARDS GRID ───────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 14px;
    }

    /* ── ACTIVITY CARD ────────────────────────── */
    .act-card {
      background: var(--row-b);
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.22);
      border: 1.5px solid rgba(0,0,0,0.06);
      border-left: 4px solid rgba(0,0,0,0.10);
      transition: opacity 0.15s;
    }
    .act-card.confirmed   { border-left-color: var(--accent); }
    .act-card:not(.confirmed) { opacity: 0.68; }

    .card-top {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 10px; gap: 8px;
    }
    .card-confirm-label {
      display: flex; align-items: center; gap: 6px; cursor: pointer;
      font-size: 10.5px; font-weight: 700; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.5px; user-select: none;
    }
    .card-confirm-label input {
      width: 18px; height: 18px; accent-color: var(--accent);
      cursor: pointer; flex-shrink: 0;
    }
    .act-card.confirmed .card-confirm-label { color: #8a6010; }
    .card-actions { display: flex; gap: 2px; flex-shrink: 0; }

    .card-name {
      font-size: 16px; font-weight: 700; color: var(--text);
      line-height: 1.3; margin-bottom: 10px;
      white-space: normal; word-break: break-word;
    }
    .card-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .meta-pill {
      background: rgba(217,141,21,0.13); color: #7a5808;
      border: 1px solid rgba(217,141,21,0.28); border-radius: 4px;
      padding: 3px 9px; font-size: 11.5px; font-weight: 600; white-space: nowrap;
    }
    .card-info {
      font-size: 12.5px; color: #3a5a5a;
      line-height: 1.55; white-space: normal; word-break: break-word;
    }

    /* ── CARD EDIT MODE ───────────────────────── */
    .act-card.editing {
      background: #fff; border-left-color: var(--accent) !important;
      box-shadow: 0 4px 28px rgba(0,0,0,0.28); opacity: 1 !important;
    }
    .edit-lbl {
      display: block; font-size: 10px; font-weight: 700; color: #4a6a72;
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px;
    }
    .edit-field {
      display: block; width: 100%; border: 1.5px solid #c8d4d4;
      border-radius: 5px; padding: 8px 10px; font-size: 13px;
      color: var(--text); background: #f8f4ec; margin-bottom: 10px;
      font-family: inherit; outline: none;
      transition: border-color 0.14s, background 0.14s;
    }
    .edit-field:focus { border-color: var(--accent); background: #fff; }
    .edit-field.edit-name { font-size: 15px; font-weight: 600; }
    .edit-field.edit-info { resize: vertical; min-height: 72px; }
    .edit-field.err { border-color: var(--danger); }
    .edit-row-3 {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px;
    }
    .edit-row-3 .edit-field { margin-bottom: 0; }
    .edit-confirm-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
      padding: 8px 10px; background: #f0ece0; border-radius: 6px;
      border: 1.5px solid #ddd4bc;
    }
    .edit-confirm-row input { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
    .edit-confirm-row label { font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer; }
    .card-edit-ftr { display: flex; justify-content: flex-end; gap: 8px; }
    .card-edit-ftr .btn-secondary { background: #e4dbc8; color: #4a6060; border: 1px solid #ccc4b0; }
    .card-edit-ftr .btn-secondary:hover { filter: brightness(0.93); }
    .card-edit-ftr .btn-primary { background: var(--tbl-hdr); color: #e4d9c0; }
    .card-edit-ftr .btn-primary:hover { filter: brightness(1.18); }

    /* ── EMPTY STATE ──────────────────────────── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: rgba(240,232,208,0.28); font-size: 14px;
    }

    /* ── ICON BUTTONS ─────────────────────────── */
    .icon-btn {
      display: inline-flex; align-items: center; justify-content: center;
      border: none; background: transparent; cursor: pointer;
      padding: 6px; border-radius: 4px; color: inherit; transition: background 0.13s;
    }
    .icon-btn.copy       { color: #8a6010; }
    .icon-btn.copy:hover { background: rgba(138,96,16,0.14); }
    .icon-btn.edit       { color: #1a5060; }
    .icon-btn.edit:hover { background: rgba(26,80,96,0.14); }
    .icon-btn.del        { color: #963030; }
    .icon-btn.del:hover  { background: rgba(150,48,48,0.14); }

    /* ── MODAL ────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 16px;
    }
    .modal {
      background: #fff; border-radius: 8px; width: 460px; max-width: 100%;
      box-shadow: 0 12px 50px rgba(0,0,0,0.45); overflow: hidden;
      animation: modal-in 0.17s ease;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: translateY(-10px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }
    .modal-hdr {
      background: var(--tbl-hdr); color: #e4d9c0; padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 14px; font-weight: 700;
    }
    .modal-hdr .close-btn {
      background: none; border: none; color: rgba(228,217,192,0.6);
      font-size: 20px; cursor: pointer; padding: 0 2px;
      border-radius: 3px; transition: color 0.13s;
    }
    .modal-hdr .close-btn:hover { color: #e4d9c0; }
    .modal-body { padding: 20px 20px 4px; }
    .modal-ftr {
      display: flex; justify-content: flex-end; gap: 8px;
      padding: 14px 20px; margin-top: 16px;
      border-top: 1px solid #e4dbc8; background: #f8f2e4;
    }
    .fgrp { margin-bottom: 14px; }
    .fgrp label {
      display: block; font-size: 10.5px; font-weight: 700; color: #4a6a72;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px;
    }
    .fgrp input[type="text"],
    .fgrp input[type="date"],
    .fgrp textarea {
      width: 100%; border: 1.5px solid #c8d4d4; border-radius: 5px;
      padding: 7px 10px; font-size: 13px; color: var(--text);
      background: #f8f4ec; outline: none;
      transition: border-color 0.14s, background 0.14s; font-family: inherit;
    }
    .fgrp textarea { resize: vertical; min-height: 64px; }
    .fgrp input:focus, .fgrp textarea:focus { border-color: var(--accent); background: #fff; }
    .fgrp input.err { border-color: var(--danger); }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .fgrp-check {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
      padding: 10px 12px; background: #f0ece0;
      border-radius: 6px; border: 1.5px solid #ddd4bc;
    }
    .fgrp-check input[type="checkbox"] {
      width: 18px; height: 18px; accent-color: var(--accent);
      cursor: pointer; flex-shrink: 0;
    }
    .fgrp-check label {
      font-size: 13px; font-weight: 600; color: var(--text);
      cursor: pointer; text-transform: none; letter-spacing: 0; margin-bottom: 0;
    }
    .modal-ftr .btn-secondary { background: #e4dbc8; color: #4a6060; border: 1px solid #ccc4b0; }
    .modal-ftr .btn-secondary:hover { filter: brightness(0.93); }
    .modal-ftr .btn-primary { background: var(--tbl-hdr); color: #e4d9c0; }
    .modal-ftr .btn-primary:hover { filter: brightness(1.18); }

    /* ── CARD PREVIEW MODAL ───────────────────── */
    .card-modal {
      background: #fff; border-radius: 8px; width: min(560px, 92vw);
      max-height: 92vh; overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 12px 50px rgba(0,0,0,0.55); animation: modal-in 0.17s ease;
    }
    .card-preview-body {
      flex: 1; overflow-y: auto; padding: 20px; background: #111e2c;
      display: flex; justify-content: center; align-items: flex-start;
    }
    .card-preview-body img {
      max-width: 100%; border-radius: 5px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.6); display: block;
    }

    /* ── TOAST ────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--tbl-hdr);
      color: #e4d9c0; padding: 10px 18px; border-radius: 6px;
      font-size: 13px; font-weight: 600; z-index: 300;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; border-left: 3px solid var(--accent);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-left">
    <div class="eyebrow">Hurghada 2026 &middot; Gruppresan</div>
    <h1>Aktivitetsplanering</h1>
    <p>Sorteras automatiskt på datum och tid &mdash; bocka av för att bekräfta</p>
  </div>
  <div class="toolbar-right">
    <button class="btn btn-copy" onclick="copyPlan()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Kopiera reseplan
    </button>
    <button class="btn btn-primary" onclick="openModal(null)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Lägg till aktivitet
    </button>
    <button class="btn btn-secondary" onclick="saveJSON()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Spara
    </button>
    <button class="btn btn-secondary" onclick="loadJSON()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Ladda
    </button>
  </div>
</div>

<div id="cards-grid" class="cards-grid"></div>
<div id="empty-state" class="empty-state" style="display:none">Inga aktiviteter ännu — lägg till en!</div>

<!-- Add activity modal -->
<div id="overlay" class="overlay" style="display:none" onclick="onOverlayClick(event)">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-hdr">
      <span id="modal-title">Lägg till aktivitet</span>
      <button class="close-btn" onclick="closeModal()" title="Stäng">&times;</button>
    </div>
    <div class="modal-body">
      <div class="fgrp">
        <label>Aktivitetsnamn</label>
        <input type="text" id="f-name" placeholder="t.ex. Snorkling vid Giftun Island" autocomplete="off" />
      </div>
      <div class="form-row-3">
        <div class="fgrp">
          <label>Datum</label>
          <input type="date" id="f-day" />
        </div>
        <div class="fgrp">
          <label>Starttid</label>
          <input type="text" id="f-starttime" placeholder="08:00" />
        </div>
        <div class="fgrp">
          <label>Tidslängd</label>
          <input type="text" id="f-duration" placeholder="2h" />
        </div>
      </div>
      <div class="fgrp">
        <label>Information</label>
        <textarea id="f-info" rows="3" placeholder="Mötesplats, vad man ska ta med..."></textarea>
      </div>
      <div class="fgrp-check">
        <input type="checkbox" id="f-confirmed" />
        <label for="f-confirmed">Bekräftad aktivitet</label>
      </div>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-secondary" onclick="closeModal()">Avbryt</button>
      <button class="btn btn-primary" onclick="saveActivity()">Spara aktivitet</button>
    </div>
  </div>
</div>

<!-- Card preview modal (fallback when clipboard API fails) -->
<div id="card-overlay" class="overlay" style="display:none" onclick="onCardOverlayClick(event)">
  <div class="card-modal">
    <div class="modal-hdr">
      <span id="card-modal-title">Aktivitetskort</span>
      <button class="close-btn" onclick="closeCardModal()" title="Stäng">&times;</button>
    </div>
    <div class="card-preview-body">
      <img id="card-img" src="" alt="Aktivitetskort" />
    </div>
    <div class="modal-ftr">
      <button class="btn btn-secondary" onclick="closeCardModal()">Stäng</button>
      <button class="btn btn-secondary" id="card-dl-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Ladda ner
      </button>
      <button class="btn btn-primary" id="card-copy-img-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Kopiera bild
      </button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  let ACTIVITIES = [];
  let order      = [];
  let nextId     = 1;
  let editingId  = null;

  const byId = id => ACTIVITIES.find(a => a.id === id);

  const WEEKDAYS = ['Söndag','Måndag','Tisdag','Onsdag','Torsdag','Fredag','Lördag'];
  const MONTHS   = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];

  function formatDay(iso) {
    if (!iso) return null;
    const d = new Date(iso + 'T12:00:00');
    return `${WEEKDAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
  }

  function parseTime(t) {
    if (!t) return Infinity;
    const m = t.match(/^(\d{1,2}):(\d{2})/);
    return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : Infinity;
  }

  function sortOrder() {
    order.sort((idA, idB) => {
      const a = byId(idA), b = byId(idB);
      const da = a.day ? new Date(a.day + 'T12:00:00').getTime() : Infinity;
      const db = b.day ? new Date(b.day + 'T12:00:00').getTime() : Infinity;
      if (da !== db) return da - db;
      return parseTime(a.startTime) - parseTime(b.startTime);
    });
  }

  // ── RENDER ─────────────────────────────────────────────────────────────────
  function render() {
    sortOrder();
    const grid  = document.getElementById('cards-grid');
    const empty = document.getElementById('empty-state');
    grid.innerHTML = '';
    if (order.length === 0) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    order.forEach(id => grid.appendChild(buildCard(id)));
  }

  function buildCard(id) {
    const a = byId(id);
    const card = document.createElement('div');
    card.className = 'act-card' + (a.confirmed ? ' confirmed' : '');
    card.dataset.id = id;

    const dayStr = formatDay(a.day);
    const pills  = [dayStr, a.startTime || null, a.duration || null]
      .filter(Boolean)
      .map(s => `<span class="meta-pill">${escHtml(s)}</span>`)
      .join('');

    card.innerHTML = `
      <div class="card-top">
        <label class="card-confirm-label">
          <input type="checkbox" ${a.confirmed ? 'checked' : ''} onchange="toggleConfirmed(${id}, this.checked)" />
          <span>${a.confirmed ? 'Bekräftad' : 'Önskemål'}</span>
        </label>
        <div class="card-actions">
          <button class="icon-btn copy" title="Kopiera bildkort" onclick="generateCard(${id})">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="5" y="2" width="14" height="20" rx="2"/>
              <line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="13" y2="15"/>
            </svg>
          </button>
          <button class="icon-btn edit" title="Redigera" onclick="startEdit(${id})">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
          <button class="icon-btn del" title="Ta bort" onclick="deleteActivity(${id})">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="card-name">${escHtml(a.name)}</div>
      ${pills ? `<div class="card-meta">${pills}</div>` : ''}
      ${a.information ? `<div class="card-info">${escHtml(a.information)}</div>` : ''}`;
    return card;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) {
    return escHtml(s).replace(/'/g,'&#39;');
  }

  // ── TOGGLE CONFIRMED ───────────────────────────────────────────────────────
  function toggleConfirmed(id, checked) {
    byId(id).confirmed = checked;
    const card = document.querySelector(`.act-card[data-id="${id}"]`);
    if (!card || card.classList.contains('editing')) return;
    card.classList.toggle('confirmed', checked);
    const span = card.querySelector('.card-confirm-label span');
    if (span) span.textContent = checked ? 'Bekräftad' : 'Önskemål';
  }

  // ── INLINE EDIT ────────────────────────────────────────────────────────────
  function startEdit(id) {
    document.querySelectorAll('.act-card.editing').forEach(c => {
      if (parseInt(c.dataset.id) !== id) cancelEdit(parseInt(c.dataset.id));
    });
    const a = byId(id);
    const card = document.querySelector(`.act-card[data-id="${id}"]`);
    card.classList.add('editing', 'confirmed');

    card.innerHTML = `
      <span class="edit-lbl">Aktivitetsnamn</span>
      <input class="edit-field edit-name" id="ec-name-${id}" value="${escAttr(a.name)}" placeholder="Aktivitetsnamn" />
      <div class="edit-row-3">
        <div><span class="edit-lbl">Datum</span><input type="date" class="edit-field" id="ec-day-${id}" value="${escAttr(a.day||'')}" /></div>
        <div><span class="edit-lbl">Starttid</span><input class="edit-field" id="ec-time-${id}" value="${escAttr(a.startTime||'')}" placeholder="08:00" /></div>
        <div><span class="edit-lbl">Längd</span><input class="edit-field" id="ec-dur-${id}" value="${escAttr(a.duration||'')}" placeholder="2h" /></div>
      </div>
      <span class="edit-lbl">Information</span>
      <textarea class="edit-field edit-info" id="ec-info-${id}" placeholder="Mötesplats, vad man ska ta med...">${escHtml(a.information||'')}</textarea>
      <div class="edit-confirm-row">
        <input type="checkbox" id="ec-conf-${id}" ${a.confirmed ? 'checked' : ''} />
        <label for="ec-conf-${id}">Bekräftad aktivitet</label>
      </div>
      <div class="card-edit-ftr">
        <button class="btn btn-secondary btn-sm" onclick="cancelEdit(${id})">Avbryt</button>
        <button class="btn btn-primary btn-sm" onclick="saveEdit(${id})">Spara</button>
      </div>`;
    document.getElementById(`ec-name-${id}`).focus();
  }

  function saveEdit(id) {
    const nameEl = document.getElementById(`ec-name-${id}`);
    const name   = nameEl.value.trim();
    if (!name) { nameEl.classList.add('err'); nameEl.focus(); return; }
    const a = byId(id);
    a.name        = name;
    a.day         = document.getElementById(`ec-day-${id}`).value;
    a.startTime   = document.getElementById(`ec-time-${id}`).value.trim();
    a.duration    = document.getElementById(`ec-dur-${id}`).value.trim();
    a.information = document.getElementById(`ec-info-${id}`).value.trim();
    a.confirmed   = document.getElementById(`ec-conf-${id}`).checked;
    render();
  }

  function cancelEdit(id) {
    const card = document.querySelector(`.act-card[data-id="${id}"]`);
    if (!card) return;
    card.replaceWith(buildCard(id));
  }

  // ── CRUD ───────────────────────────────────────────────────────────────────
  function openModal(id) {
    editingId = id;
    document.getElementById('modal-title').textContent = id ? 'Redigera aktivitet' : 'Lägg till aktivitet';
    const a = id ? byId(id) : null;
    const nameEl = document.getElementById('f-name');
    nameEl.value = a ? a.name : '';
    nameEl.classList.remove('err');
    document.getElementById('f-day').value        = a ? (a.day       || '') : '';
    document.getElementById('f-starttime').value  = a ? (a.startTime || '') : '';
    document.getElementById('f-duration').value   = a ? (a.duration  || '') : '';
    document.getElementById('f-info').value       = a ? (a.information || '') : '';
    document.getElementById('f-confirmed').checked = a ? !!a.confirmed : false;
    document.getElementById('overlay').style.display = 'flex';
    setTimeout(() => nameEl.focus(), 60);
  }

  function closeModal() {
    document.getElementById('overlay').style.display = 'none';
    editingId = null;
  }

  function onOverlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  function saveActivity() {
    const nameEl = document.getElementById('f-name');
    const name   = nameEl.value.trim();
    if (!name) { nameEl.classList.add('err'); nameEl.focus(); return; }
    nameEl.classList.remove('err');
    const fields = {
      name,
      day:         document.getElementById('f-day').value,
      startTime:   document.getElementById('f-starttime').value.trim(),
      duration:    document.getElementById('f-duration').value.trim(),
      information: document.getElementById('f-info').value.trim(),
      confirmed:   document.getElementById('f-confirmed').checked,
    };
    if (editingId) {
      Object.assign(byId(editingId), fields);
    } else {
      const id = nextId++;
      ACTIVITIES.push({ id, ...fields });
      order.push(id);
    }
    closeModal();
    render();
  }

  function deleteActivity(id) {
    if (!confirm(`Ta bort "${byId(id).name}"?`)) return;
    ACTIVITIES = ACTIVITIES.filter(a => a.id !== id);
    order      = order.filter(i => i !== id);
    render();
  }

  // ── WHATSAPP FORMAT ────────────────────────────────────────────────────────
  function daySort(d) {
    return d ? new Date(d + 'T12:00:00').getTime() : Number.MAX_SAFE_INTEGER;
  }

  function formatForWhatsApp(a) {
    const parts = [formatDay(a.day), a.startTime || null, a.duration || null].filter(Boolean);
    let text = `*${a.name}*`;
    if (parts.length) text += `\n_${parts.join(' · ')}_`;
    if (a.information) text += `\n\n${a.information}`;
    return text;
  }

  async function copyPlan() {
    const confirmed = order.map(id => byId(id)).filter(a => a.confirmed);
    const wishlist  = order.map(id => byId(id)).filter(a => !a.confirmed);

    function section(list, label) {
      if (!list.length) return '';
      const grouped = {};
      [...list].sort((a, b) => daySort(a.day) - daySort(b.day)).forEach(a => {
        const k = formatDay(a.day) || '—';
        (grouped[k] = grouped[k] || []).push(a);
      });
      let out = `*${label}*\n\n`;
      for (const [day, acts] of Object.entries(grouped)) {
        out += `*${day}*\n\n`;
        acts.forEach(a => { out += formatForWhatsApp(a) + '\n\n'; });
      }
      return out;
    }

    let text = '*HURGHADA 2026 – RESEPLAN*\n\n';
    text += section(confirmed, 'BEKRÄFTADE AKTIVITETER');
    if (wishlist.length) text += section(wishlist, 'ÖNSKEMÅL / RESERV');
    try {
      await navigator.clipboard.writeText(text.trimEnd());
      showToast('Reseplan kopierad till urklipp');
    } catch { alert('Kunde inte komma åt urklipp.'); }
  }

  // ── CARD IMAGE GENERATOR ───────────────────────────────────────────────────
  function getWrappedLines(ctx, text, maxW) {
    const words = text.split(' ');
    const lines = []; let line = '';
    for (const w of words) {
      const test = line ? line + ' ' + w : w;
      if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
      else line = test;
    }
    if (line) lines.push(line);
    return lines;
  }

  function cardRoundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
  }

  function getInfoLines(ctx, text, maxW, normalFont, boldFont) {
    const wordList = [];
    text.split('*').forEach((part, i) => {
      const bold = i % 2 === 1;
      part.split(/\s+/).filter(w => w).forEach(w => wordList.push({ w, bold }));
    });
    const lines = []; let lineWords = [], lineWidth = 0;
    wordList.forEach(item => {
      ctx.font = item.bold ? boldFont : normalFont;
      const ww = ctx.measureText(item.w).width;
      const sp = lineWords.length ? ctx.measureText(' ').width : 0;
      if (lineWords.length && lineWidth + sp + ww > maxW) {
        lines.push(lineWords); lineWords = [item]; lineWidth = ww;
      } else { lineWords.push(item); lineWidth += sp + ww; }
    });
    if (lineWords.length) lines.push(lineWords);
    return lines;
  }

  function drawInfoLine(ctx, lineWords, x, y, normalFont, boldFont, color) {
    let cx = x;
    lineWords.forEach((item, i) => {
      ctx.font = item.bold ? boldFont : normalFont;
      ctx.fillStyle = color;
      if (i > 0) { ctx.fillText(' ', cx, y); cx += ctx.measureText(' ').width; }
      ctx.fillText(item.w, cx, y);
      cx += ctx.measureText(item.w).width;
    });
  }

  function buildCardCanvas(id) {
    const a = byId(id);
    const W = 900, H = 1600;
    const F_NAME      = 'bold 70px -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif';
    const F_DATE      = '600 40px -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif';
    const F_TIME      = '400 30px -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif';
    const F_INFO      = '400 28px -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif';
    const F_INFO_BOLD = '700 28px -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif';
    const NAME_LH = 88, INFO_LH = 44, BP = 32;

    const tmp = document.createElement('canvas').getContext('2d');
    tmp.font = F_NAME;
    const nameLines = getWrappedLines(tmp, a.name, W - 180);
    let infoLines = [];
    if (a.information) { infoLines = getInfoLines(tmp, a.information, W - 220, F_INFO, F_INFO_BOLD); }

    const nameH    = nameLines.length * NAME_LH;
    const dateH    = a.day                       ? 72 : 0;
    const timeH    = (a.startTime || a.duration) ? 56 : 0;
    const infoH    = infoLines.length ? infoLines.length * INFO_LH + BP * 2 + 48 : 0;
    const contentH = nameH + 24 + dateH + timeH + infoH;

    const zoneTop = 150, zoneBot = H - 150;
    const cy0 = Math.max(zoneTop, Math.round((zoneTop + zoneBot) / 2 - contentH / 2));

    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    const bg = ctx.createLinearGradient(0, 0, W * 0.5, H);
    bg.addColorStop(0, '#0c1f34'); bg.addColorStop(1, '#102d45');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    const glow = ctx.createRadialGradient(W/2, cy0+contentH/2, 0, W/2, cy0+contentH/2, W*0.75);
    glow.addColorStop(0, 'rgba(217,141,21,0.08)'); glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = 'rgba(255,255,255,0.02)'; ctx.lineWidth = 1;
    for (let y = 0; y < H; y += 34) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    ctx.fillStyle = '#d98d15'; ctx.fillRect(0, 0, W, 6);
    ctx.fillStyle = 'rgba(217,141,21,0.9)';
    ctx.font = '700 17px -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('H U R G H A D A  2 0 2 6', W/2, 58);
    ctx.strokeStyle = 'rgba(217,141,21,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(90, 76); ctx.lineTo(W-90, 76); ctx.stroke();

    let cy = cy0;
    ctx.fillStyle = '#f0e8d0'; ctx.font = F_NAME; ctx.textAlign = 'center';
    nameLines.forEach((l, i) => ctx.fillText(l, W/2, cy + i * NAME_LH));
    cy += nameH + 24;

    if (a.day) {
      ctx.fillStyle = '#e4d9c0'; ctx.font = F_DATE; ctx.textAlign = 'left';
      ctx.fillText(formatDay(a.day), 100, cy); cy += dateH;
    }
    if (a.startTime || a.duration) {
      ctx.font = F_TIME; ctx.textAlign = 'left';
      let tx = 100;
      if (a.startTime) {
        ctx.fillStyle = '#ff3cac';
        ctx.fillText(a.startTime, tx, cy);
        tx += ctx.measureText(a.startTime).width;
      }
      if (a.startTime && a.duration) {
        ctx.fillStyle = 'rgba(228,217,192,0.45)';
        const sep = '   ·   ';
        ctx.fillText(sep, tx, cy);
        tx += ctx.measureText(sep).width;
      }
      if (a.duration) {
        ctx.fillStyle = 'rgba(228,217,192,0.45)';
        ctx.fillText(a.duration, tx, cy);
      }
      cy += timeH;
    }
    if (infoLines.length) {
      cy += 48;
      const bx = 80, bw = W - 160, bh = infoLines.length * INFO_LH + BP * 2;
      cardRoundRect(ctx, bx, cy, bw, bh, 14);
      ctx.fillStyle = 'rgba(255,255,255,0.052)'; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.10)'; ctx.lineWidth = 1; ctx.stroke();
      infoLines.forEach((line, i) => drawInfoLine(ctx, line, bx+BP, cy+BP+22+i*INFO_LH, F_INFO, F_INFO_BOLD, '#ffffff'));
    }

    ctx.strokeStyle = 'rgba(217,141,21,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(90, H-76); ctx.lineTo(W-90, H-76); ctx.stroke();
    ctx.fillStyle = 'rgba(217,141,21,0.6)';
    ctx.font = '700 17px -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('H U R G H A D A  2 0 2 6', W/2, H-48);
    ctx.fillStyle = '#d98d15'; ctx.fillRect(0, H-6, W, 6);

    return canvas;
  }

  async function generateCard(id) {
    const canvas = buildCardCanvas(id);
    const name   = byId(id).name;
    try {
      const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      showToast('Bildkort kopierat till urklipp');
    } catch {
      showCardPreview(canvas, name);
    }
  }

  let _cardCanvas = null;

  function showCardPreview(canvas, name) {
    _cardCanvas = canvas;
    document.getElementById('card-modal-title').textContent = name;
    document.getElementById('card-img').src = canvas.toDataURL('image/png');
    document.getElementById('card-dl-btn').onclick = () => {
      const link = document.createElement('a');
      link.download = name.replace(/[^\w\sÅÄÖåäö]/g,'').trim().replace(/\s+/g,'-').toLowerCase() + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    };
    document.getElementById('card-copy-img-btn').onclick = async () => {
      try {
        const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        showToast('Bild kopierad till urklipp');
      } catch { showToast('Klicka "Ladda ner" och dela bilden'); }
    };
    document.getElementById('card-overlay').style.display = 'flex';
  }

  function closeCardModal() {
    document.getElementById('card-overlay').style.display = 'none';
    _cardCanvas = null;
  }

  function onCardOverlayClick(e) {
    if (e.target === document.getElementById('card-overlay')) closeCardModal();
  }

  // ── TOAST ──────────────────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── SAVE / LOAD ────────────────────────────────────────────────────────────
  async function saveJSON() {
    const payload = { order, activities: ACTIVITIES };
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: 'hurghada_aktiviteter.json',
        types: [{ description: 'Aktiviteter JSON', accept: { 'application/json': ['.json'] } }]
      });
      const w = await handle.createWritable();
      await w.write(JSON.stringify(payload, null, 2));
      await w.close();
      showToast('Sparat!');
    } catch (err) { if (err.name !== 'AbortError') alert('Kunde inte spara: ' + err.message); }
  }

  async function loadJSON() {
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{ description: 'Aktiviteter JSON', accept: { 'application/json': ['.json'] } }],
        multiple: false
      });
      const data = JSON.parse(await (await handle.getFile()).text());
      if (!Array.isArray(data.activities) || !Array.isArray(data.order)) throw new Error('Ogiltigt format');
      ACTIVITIES = data.activities;
      order      = data.order;
      nextId     = Math.max(0, ...ACTIVITIES.map(a => a.id)) + 1;
      render();
    } catch (err) { if (err.name !== 'AbortError') alert('Kunde inte ladda — ' + err.message); }
  }

  // ── KEYBOARD ───────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    const open = document.getElementById('overlay').style.display === 'flex';
    if (!open) return;
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && !['BUTTON','TEXTAREA','SELECT'].includes(e.target.tagName)) {
      e.preventDefault(); saveActivity();
    }
  });

  // ── SAMPLE DATA ────────────────────────────────────────────────────────────
  ACTIVITIES = [
    { id:1, name:'Välkomstmiddag vid havet',    day:'2026-07-18', startTime:'19:00', duration:'3h',      information:'Hotellets strandrestaurang. Ta med festkläder.',                                            confirmed:true  },
    { id:2, name:'Snorkling vid Giftun Island', day:'2026-07-19', startTime:'08:00', duration:'Halvdag', information:'Hotellets brygga. Ta med badkläder, solskydd och handduk. Medhav mat och dryck för dagen.', confirmed:true  },
    { id:3, name:'Glassbottenbåt',              day:'2026-07-19', startTime:'14:30', duration:'2h',      information:'Gamla hamnen. Solglasögon och kamera rekommenderas.',                                       confirmed:true  },
    { id:4, name:'Ökenjeep safari',             day:'2026-07-20', startTime:'14:30', duration:'Halvdag', information:'Samling vid hotellentré. Ta med långa byxor, solhatt och vatten.',                          confirmed:true  },
    { id:5, name:'Dykning för nybörjare',       day:'2026-07-21', startTime:'08:30', duration:'3h',      information:'Divingcentret vid hotellet. Obligatorisk säkerhetsgenomgång ingår.',                        confirmed:true  },
    { id:6, name:'Parasailing',                 day:'2026-07-20', startTime:'11:00', duration:'1h',      information:'Centralstranden. Badkläder medhav.',                                                        confirmed:false },
    { id:7, name:'Kamelridning vid solnedgång', day:'2026-07-22', startTime:'17:00', duration:'2h',      information:'Ökensafaribasen. Ta med långa byxor och robusta skor.',                                     confirmed:false },
    { id:8, name:'Spa & hammam',                day:'2026-07-21', startTime:'10:00', duration:'2h',      information:'Hotellets spaavdelning. Medhav bokningsbekräftelse.',                                       confirmed:false },
    { id:9, name:'Quad bike i öknen',           day:'2026-07-22', startTime:'15:00', duration:'3h',      information:'Ökensafaribasen. Ta med långa byxor, skor och solglasögon.',                                confirmed:false },
  ];
  order  = ACTIVITIES.map(a => a.id);
  nextId = ACTIVITIES.length + 1;
  render();
</script>
